<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0a0a0f;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Background glow */
  .glow {
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
    top: -200px; left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
  }
  .glow2 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%);
    bottom: -100px; right: 100px;
  }

  /* Grid lines */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .content {
    position: relative;
    z-index: 10;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 100px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(99,102,241,0.12);
    border: 1px solid rgba(99,102,241,0.35);
    color: #a5b4fc;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 999px;
    margin-bottom: 28px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    width: fit-content;
  }
  .badge-dot {
    width: 7px; height: 7px;
    background: #818cf8;
    border-radius: 50%;
  }

  h1 {
    font-size: 76px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -0.04em;
    color: #f1f5f9;
    margin-bottom: 24px;
  }
  h1 .strike {
    text-decoration: line-through;
    text-decoration-color: #ef4444;
    color: #64748b;
  }
  h1 .accent { color: #818cf8; }

  .sub {
    font-size: 24px;
    color: #64748b;
    font-weight: 500;
    margin-bottom: 44px;
    line-height: 1.5;
  }
  .sub strong { color: #94a3b8; }

  .features {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .feat {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 14px;
    color: #94a3b8;
    font-weight: 500;
  }
  .feat .check {
    color: #22c55e;
    font-size: 15px;
    font-weight: 800;
  }

  /* URL tag bottom right */
  .url-tag {
    position: absolute;
    bottom: 40px;
    right: 80px;
    font-size: 18px;
    font-weight: 800;
    color: #475569;
    letter-spacing: -0.01em;
    z-index: 10;
  }
  .url-tag span { color: #6366f1; }

  /* Logo top left */
  .logo {
    position: absolute;
    top: 40px;
    left: 80px;
    font-size: 20px;
    font-weight: 900;
    color: #f1f5f9;
    z-index: 10;
    letter-spacing: -0.02em;
  }
  .logo span { color: #818cf8; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="grid"></div>

  <div class="logo">FreeJobBoard<span>.ai</span></div>

  <div class="content">
    <div class="badge">
      <div class="badge-dot"></div>
      Beta now open
    </div>

    <h1>
      The job board<br/>
      template industry<br/>
      is <span class="strike">broken</span>.<br/>
      <span class="accent">We're fixing it.</span>
    </h1>

    <p class="sub">
      <strong>Free forever.</strong> No credit card. No ugly templates.
    </p>

    <div class="features">
      <div class="feat"><span class="check">✓</span> Custom domain</div>
      <div class="feat"><span class="check">✓</span> No watermarks</div>
      <div class="feat"><span class="check">✓</span> Unlimited listings</div>
      <div class="feat"><span class="check">✓</span> Dark mode</div>
      <div class="feat"><span class="check">✓</span> Google Jobs SEO</div>
      <div class="feat"><span class="check">✓</span> Embeddable widget</div>
    </div>
  </div>

  <div class="url-tag">freejobboard<span>.ai</span></div>
</body>
</html>
